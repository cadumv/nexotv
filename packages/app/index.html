<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <!-- NUNCA cachear o index.html: o WebView do Android estava servindo uma versão
         antiga (apontando p/ assets velhos) mesmo após atualizar o APK — as correções
         não chegavam ao aparelho. Os assets têm hash no nome (imutáveis), então só o
         HTML precisa revalidar sempre. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Rajada</title>
    <style>html,body{margin:0;background:#000}</style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
